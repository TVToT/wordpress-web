name: ddev-mysite
services:
  db:
    build:
      context: ${PROJECT_ROOT}/.ddev/.dbimageBuild
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ddev/ddev-dbserver-mariadb-11.8:v1.25.3
        gid: "1000"
        uid: "1000"
        username: ${DDEV_USER}
      labels:
        com.ddev.app-type: wordpress
        com.ddev.approot: ${PROJECT_ROOT}
        com.ddev.platform: ddev
        com.ddev.site-name: mysite
        com.ddev.webtag: v1.25.3
    cap_add:
      - SYS_NICE
    command: []
    container_name: ddev-mysite-db
    environment:
      BITNAMI_VOLUME_DIR: ""
      COLUMNS: "120"
      DDEV_DATABASE: mariadb:11.8
      DDEV_DATABASE_FAMILY: mysql
      DDEV_GID: "1000"
      DDEV_GOARCH: amd64
      DDEV_GOOS: linux
      DDEV_HOSTNAME: mysite.ddev.site
      DDEV_PHP_VERSION: "8.4"
      DDEV_PRIMARY_URL: https://mysite.ddev.site
      DDEV_PRIMARY_URL_PORT: "443"
      DDEV_PRIMARY_URL_WITHOUT_PORT: https://mysite.ddev.site
      DDEV_PROJECT: mysite
      DDEV_PROJECT_TYPE: wordpress
      DDEV_ROUTER_HTTP_PORT: "33000"
      DDEV_ROUTER_HTTPS_PORT: "443"
      DDEV_SCHEME: https
      DDEV_SITENAME: mysite
      DDEV_TLD: ddev.site
      DDEV_UID: "1000"
      DDEV_USER: ${DDEV_USER}
      DDEV_VERSION: v1.25.3
      DOCKER_IP: 127.0.0.1
      HOME: ${HOME}
      HOST_DOCKER_INTERNAL_IP: ""
      IS_DDEV_PROJECT: "true"
      LINES: "30"
      MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/mysite-db/mysql_history
      PGDATABASE: db
      PGHOST: 127.0.0.1
      PGPASSWORD: db
      PGUSER: db
      POSTGRES_DB: db
      POSTGRES_PASSWORD: db
      POSTGRES_USER: db
      TZ: America/New_York
      USER: ${DDEV_USER}
    hostname: mysite-db
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-dbserver-mariadb-11.8:v1.25.3-mysite-built
    labels:
      com.ddev.app-type: wordpress
      com.ddev.approot: ${PROJECT_ROOT}
      com.ddev.platform: ddev
      com.ddev.site-name: mysite
      com.ddev.webtag: v1.25.3
    networks:
      ddev_default: null
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 3306
        published: "32773"
        protocol: tcp
    restart: 'no'
    stop_grace_period: 1m0s
    user: 1000:1000
    volumes:
      - type: volume
        source: database
        target: /var/lib/mysql
        volume:
          nocopy: true
      - type: bind
        source: ${PROJECT_ROOT}/.ddev
        target: /mnt/ddev_config
        bind: {}
      - type: bind
        source: ${PROJECT_ROOT}/.ddev/db_snapshots
        target: /mnt/snapshots
        bind: {}
      - type: volume
        source: ddev-global-cache
        target: /mnt/ddev-global-cache
        volume: {}
    working_dir: ${HOME}
  web:
    build:
      context: ${PROJECT_ROOT}/.ddev/.webimageBuild
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ddev/ddev-webserver:v1.25.3
        DDEV_DATABASE: mariadb:11.8
        DDEV_PHP_VERSION: "8.4"
        gid: "1000"
        uid: "1000"
        username: ${DDEV_USER}
      labels:
        com.ddev.app-type: wordpress
        com.ddev.approot: ${PROJECT_ROOT}
        com.ddev.platform: ddev
        com.ddev.site-name: mysite
        com.ddev.webtag: v1.25.3
    cap_add:
      - SYS_PTRACE
    command:
      - /pre-start.sh
    container_name: ddev-mysite-web
    environment:
      COLUMNS: "120"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      COREPACK_HOME: /mnt/ddev-global-cache/corepack
      DDEV_APPROOT: /var/www/html
      DDEV_COMPOSER_ROOT: /var/www/html
      DDEV_DATABASE: mariadb:11.8
      DDEV_DATABASE_FAMILY: mysql
      DDEV_DOCROOT: web
      DDEV_FILES_DIR: /var/www/html/web/wp-content/uploads
      DDEV_FILES_DIRS: /var/www/html/web/wp-content/uploads
      DDEV_GID: "1000"
      DDEV_GOARCH: amd64
      DDEV_GOOS: linux
      DDEV_HOSTNAME: mysite.ddev.site
      DDEV_MUTAGEN_ENABLED: "false"
      DDEV_PHP_VERSION: "8.4"
      DDEV_PRIMARY_URL: https://mysite.ddev.site
      DDEV_PRIMARY_URL_PORT: "443"
      DDEV_PRIMARY_URL_WITHOUT_PORT: https://mysite.ddev.site
      DDEV_PROJECT: mysite
      DDEV_PROJECT_TYPE: wordpress
      DDEV_ROUTER_HTTP_PORT: "33000"
      DDEV_ROUTER_HTTPS_PORT: "443"
      DDEV_SCHEME: https
      DDEV_SITENAME: mysite
      DDEV_TLD: ddev.site
      DDEV_UID: "1000"
      DDEV_USER: ${DDEV_USER}
      DDEV_VERSION: v1.25.3
      DDEV_WEB_ENTRYPOINT: /mnt/ddev_config/web-entrypoint.d
      DDEV_WEBSERVER_TYPE: nginx-fpm
      DDEV_XDEBUG_ENABLED: "false"
      DDEV_XHPROF_MODE: xhgui
      DEPLOY_NAME: local
      DOCKER_IP: 127.0.0.1
      DOCROOT: web
      DRUSH_OPTIONS_URI: https://mysite.ddev.site
      HOST_DOCKER_INTERNAL_IP: ""
      HTTP_EXPOSE: 33000:80,8025:8025
      HTTPS_EXPOSE: 443:80,8026:8025
      IS_DDEV_PROJECT: "true"
      LINES: "30"
      MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/mysite-web/mysql_history
      N_CACHE_PREFIX: /mnt/ddev-global-cache/n_prefix/mysite-web
      N_PREFIX: /usr/local/n
      NODE_EXTRA_CA_CERTS: /mnt/ddev-global-cache/mkcert/rootCA.pem
      PGDATABASE: db
      PGHOST: db
      PGPASSWORD: db
      PGUSER: db
      PHP_IDE_CONFIG: serverName=mysite.ddev.site
      SSH_AUTH_SOCK: /home/.ssh-agent/socket
      TZ: America/New_York
      USER: ${DDEV_USER}
      VIRTUAL_HOST: mysite.ddev.site
      npm_config_cache: /mnt/ddev-global-cache/npm
    hostname: mysite-web
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-webserver:v1.25.3-mysite-built
    labels:
      com.ddev.app-type: wordpress
      com.ddev.approot: ${PROJECT_ROOT}
      com.ddev.platform: ddev
      com.ddev.site-name: mysite
      com.ddev.webtag: v1.25.3
    networks:
      ddev_default: null
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 80
        published: "54263"
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 443
        published: "54265"
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8025
        protocol: tcp
    restart: 'no'
    user: 1000:1000
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}
        target: /var/www/html
        consistency: cached
      - type: bind
        source: ${PROJECT_ROOT}/.ddev
        target: /mnt/ddev_config
        read_only: true
        bind: {}
      - type: volume
        source: ddev-global-cache
        target: /mnt/ddev-global-cache
        volume: {}
      - type: volume
        source: ddev-ssh-agent_socket_dir
        target: /home/.ssh-agent
        volume: {}
    working_dir: /var/www/html/
  xhgui:
    profiles:
      - xhgui
    container_name: ddev-mysite-xhgui
    depends_on:
      db:
        condition: service_started
        required: true
    environment:
      DDEV_DATABASE_FAMILY: mysql
      HOST_DOCKER_INTERNAL_IP: ""
      HTTP_EXPOSE: 8143:80
      HTTPS_EXPOSE: 8142:80
      TZ: America/New_York
      VIRTUAL_HOST: mysite.ddev.site
      XHGUI_PDO_PASS: db
      XHGUI_PDO_USER: db
      XHGUI_SAVE_HANDLER: pdo
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-xhgui:v1.25.3
    labels:
      com.ddev.app-type: wordpress
      com.ddev.approot: ${PROJECT_ROOT}
      com.ddev.platform: ddev
      com.ddev.site-name: mysite
      com.ddev.webtag: v1.25.3
    networks:
      ddev_default: null
      default: null
    restart: 'no'
    x-ddev:
      describe-url-port: 'Launch: ddev xhgui'
networks:
  ddev_default:
    name: ddev_default
    external: true
  default:
    name: ddev-mysite_default
    labels:
      com.ddev.app-type: wordpress
      com.ddev.approot: ${PROJECT_ROOT}
      com.ddev.platform: ddev
      com.ddev.site-name: mysite
      com.ddev.webtag: v1.25.3
volumes:
  database:
    name: mysite-mariadb
    external: true
  ddev-global-cache:
    name: ddev-global-cache
    external: true
  ddev-ssh-agent_socket_dir:
    name: ddev-ssh-agent_socket_dir
    external: true
